<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #00d4ff;
    --blue2: #0099cc;
    --dark: #020d1a;
    --panel: rgba(0,212,255,0.04);
    --border: rgba(0,212,255,0.2);
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .hud {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 8px;
    text-shadow: var(--glow);
    animation: flicker 8s infinite;
  }

  .logo span { color: rgba(0,212,255,0.4); font-size: 10px; display: block; letter-spacing: 4px; margin-top: -4px; }

  .status-bar {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: rgba(0,212,255,0.5);
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s infinite;
    margin-right: 5px;
  }

  /* ── Arc Reactor ── */
  .reactor-section {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
    position: relative;
  }

  .reactor {
    position: relative;
    width: 180px;
    height: 180px;
    cursor: pointer;
  }

  .reactor-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--blue);
    animation: spin linear infinite;
  }

  .r1 { inset: 0; animation-duration: 8s; opacity: 0.6; }
  .r2 { inset: 15px; animation-duration: 5s; animation-direction: reverse; opacity: 0.4; border-style: dashed; }
  .r3 { inset: 30px; animation-duration: 12s; opacity: 0.3; }

  .reactor-core {
    position: absolute;
    inset: 45px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.8) 0%, rgba(0,150,200,0.3) 50%, transparent 70%);
    box-shadow: 0 0 30px rgba(0,212,255,0.6), inset 0 0 20px rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  .reactor:hover .reactor-core {
    box-shadow: 0 0 60px rgba(0,212,255,1), inset 0 0 30px rgba(0,212,255,0.6);
  }

  .reactor-inner {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,212,255,0.9);
    box-shadow: 0 0 20px rgba(0,212,255,1);
    animation: pulse 1.5s infinite;
  }

  .reactor-label {
    position: absolute;
    bottom: -30px;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: rgba(0,212,255,0.5);
    letter-spacing: 3px;
  }

  /* ── Chat / Log ── */
  .chat-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    flex: 1;
    min-height: 280px;
    max-height: 340px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-panel::-webkit-scrollbar { width: 4px; }
  .chat-panel::-webkit-scrollbar-track { background: transparent; }
  .chat-panel::-webkit-scrollbar-thumb { background: var(--blue2); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    font-size: 13px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }

  .msg-tag {
    font-size: 10px;
    letter-spacing: 2px;
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
    height: fit-content;
    margin-top: 2px;
  }

  .msg.user .msg-tag  { background: rgba(0,212,255,0.15); border: 1px solid var(--blue2); color: var(--blue); }
  .msg.jarvis .msg-tag { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
  .msg.system .msg-tag { background: rgba(255,165,0,0.1); border: 1px solid orange; color: orange; }

  .msg-text { color: rgba(0,212,255,0.85); }
  .msg.jarvis .msg-text { color: rgba(0,255,200,0.9); }
  .msg.system .msg-text { color: rgba(255,200,100,0.8); font-size: 11px; }

  /* ── Input ── */
  .input-section {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-prefix {
    font-size: 12px;
    color: var(--blue2);
    white-space: nowrap;
  }

  .cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 8px 4px;
    outline: none;
    caret-color: var(--blue);
  }

  .cmd-input::placeholder { color: rgba(0,212,255,0.25); }
  .cmd-input:focus { border-bottom-color: var(--blue); }

  .send-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--blue);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .send-btn:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--blue);
    box-shadow: var(--glow);
  }

  .mic-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--blue);
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .mic-btn:hover, .mic-btn.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--blue);
    box-shadow: var(--glow);
  }

  .mic-btn.active { animation: micPulse 0.8s infinite; }

  /* ── Quick Commands ── */
  .quick-panel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .quick-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: rgba(0,212,255,0.7);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .quick-btn:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: var(--glow);
  }

  /* ── Stats Bar ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    font-size: 10px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: 2px;
  }

  .stat-name { color: rgba(0,212,255,0.4); letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { color: var(--blue); font-size: 16px; font-family: 'Orbitron', monospace; }

  /* ── Animations ── */
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes flicker { 0%,95%,100% { opacity: 1; } 96%,99% { opacity: 0.8; } }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 10px rgba(255,50,50,0.8); border-color: #ff3333; } 50% { box-shadow: 0 0 20px rgba(255,50,50,0.4); } }
  @keyframes typing { from { width: 0; } to { width: 100%; } }

  /* ── Typing indicator ── */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--blue2);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.8); opacity: 0.4; } 40% { transform: scale(1.2); opacity: 1; } }
</style>
</head>
<body>

<div class="hud">

  <!-- Header -->
  <div class="header">
    <div class="logo">J.A.R.V.I.S.<span>JUST A RATHER VERY INTELLIGENT SYSTEM</span></div>
    <div class="status-bar">
      <span><span class="status-dot"></span>ONLINE</span>
      <span id="clock">00:00:00</span>
      <span>v3.1.4</span>
    </div>
  </div>

  <!-- Arc Reactor -->
  <div class="reactor-section">
    <div class="reactor" onclick="activateReactor()">
      <div class="reactor-ring r1"></div>
      <div class="reactor-ring r2"></div>
      <div class="reactor-ring r3"></div>
      <div class="reactor-core">
        <div class="reactor-inner"></div>
      </div>
      <div class="reactor-label">ARC REACTOR · CLICK TO ACTIVATE</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-name">STATUS</div><div class="stat-value" style="font-size:12px; color:#00ff88;">ACTIVE</div></div>
    <div class="stat"><div class="stat-name">MODE</div><div class="stat-value" style="font-size:12px;" id="mode-display">TEXT</div></div>
    <div class="stat"><div class="stat-name">COMMANDS</div><div class="stat-value" id="cmd-count">0</div></div>
    <div class="stat"><div class="stat-name">AI CORE</div><div class="stat-value" style="font-size:12px; color:#00ff88;">READY</div></div>
  </div>

  <!-- Chat Log -->
  <div class="chat-panel" id="chat"></div>

  <!-- Input -->
  <div class="input-section">
    <span class="input-prefix">BOSS://</span>
    <input class="cmd-input" id="input" placeholder="enter command..." autocomplete="off" />
    <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="Voice Input">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" onclick="sendCommand()">SEND</button>
  </div>

  <!-- Quick Commands -->
  <div class="quick-panel">
    <button class="quick-btn" onclick="quickCmd('open spotify')">▶ SPOTIFY</button>
    <button class="quick-btn" onclick="quickCmd('open youtube')">▶ YOUTUBE</button>
    <button class="quick-btn" onclick="quickCmd('open terminal')">▶ TERMINAL</button>
    <button class="quick-btn" onclick="quickCmd('open github')">▶ GITHUB</button>
    <button class="quick-btn" onclick="quickCmd('what time is it')">⏱ TIME</button>
    <button class="quick-btn" onclick="quickCmd('open calculator')">⊞ CALC</button>
    <button class="quick-btn" onclick="quickCmd('open vscode')">⌨ VS CODE</button>
    <button class="quick-btn" onclick="quickCmd('take a screenshot')">📷 SCREENSHOT</button>
  </div>

</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
let cmdCount = 0;
let isListening = false;
let recognition = null;

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

// ── Startup message ──
window.addEventListener('load', () => {
  setTimeout(() => addMsg('system', 'SYS', 'J.A.R.V.I.S. HUD INITIALIZED — ALL SYSTEMS NOMINAL'), 400);
  setTimeout(() => addMsg('jarvis', 'JARVIS', "Good day, Boss. I'm online and ready. How may I assist you?"), 1000);
});

// ── Add message ──
function addMsg(type, tag, text) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<span class="msg-tag">${tag}</span><span class="msg-text">${text}</span>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ── Process command locally ──
const APP_MAP = {
  'spotify': 'open -a Spotify',
  'terminal': 'open -a Terminal',
  'finder': 'open -a Finder',
  'calculator': 'open -a Calculator',
  'notes': 'open -a Notes',
  'mail': 'open -a Mail',
  'calendar': 'open -a Calendar',
  'vscode': 'open -a "Visual Studio Code"',
  'code': 'open -a "Visual Studio Code"',
  'safari': 'open -a Safari',
  'chrome': 'open -a "Google Chrome"',
  'discord': 'open -a Discord',
  'slack': 'open -a Slack',
  'photos': 'open -a Photos',
  'maps': 'open -a Maps',
};

const SITE_MAP = {
  'youtube': 'https://youtube.com',
  'github': 'https://github.com',
  'google': 'https://google.com',
  'netflix': 'https://netflix.com',
  'reddit': 'https://reddit.com',
  'twitter': 'https://twitter.com',
  'instagram': 'https://instagram.com',
  'stackoverflow': 'https://stackoverflow.com',
  'linkedin': 'https://linkedin.com',
  'chatgpt': 'https://chat.openai.com',
};

function parseLocalIntent(text) {
  const t = text.toLowerCase();

  // Time
  if (t.includes('time') || t.includes('uhrzeit')) {
    const now = new Date();
    return `It's ${now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})} on ${now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'})}.`;
  }

  // Screenshot
  if (t.includes('screenshot')) {
    return "Screenshot command sent to system. Check your Desktop, Boss.";
  }

  // Open website
  for (const [name, url] of Object.entries(SITE_MAP)) {
    if (t.includes(name) && (t.includes('open') || t.includes('launch') || t.includes('go') || t.includes('show'))) {
      window.open(url, '_blank');
      return `Launching ${name.charAt(0).toUpperCase() + name.slice(1)} in your browser, Boss.`;
    }
  }

  // Open app (macOS — needs jarvis.py running, so we show the command)
  for (const [name, cmd] of Object.entries(APP_MAP)) {
    if (t.includes(name) && (t.includes('open') || t.includes('launch') || t.includes('start'))) {
      return `Command registered: ${cmd}. Run jarvis.py for full system integration, Boss.`;
    }
  }

  // Search
  const searchMatch = t.match(/(?:search|google)\s+(?:for\s+)?(.+)/);
  if (searchMatch) {
    const q = searchMatch[1];
    window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
    return `Searching for "${q}" — results incoming.`;
  }

  return null;
}

// ── AI via Anthropic API ──
async function askAI(text) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 150,
      system: "You are J.A.R.V.I.S., Tony Stark's AI assistant. Respond in 1-2 sentences max, with dry wit and intelligence. Address the user as 'Boss' occasionally. Be concise and clever.",
      messages: [{ role: "user", content: text }]
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || "My AI core returned no response.";
}

// ── Main send ──
async function sendCommand(text) {
  const cmd = (text || input.value).trim();
  if (!cmd) return;
  input.value = '';
  cmdCount++;
  document.getElementById('cmd-count').textContent = cmdCount;

  addMsg('user', 'BOSS', cmd);
  showTyping();

  await new Promise(r => setTimeout(r, 400));

  const local = parseLocalIntent(cmd);
  if (local) {
    hideTyping();
    addMsg('jarvis', 'JARVIS', local);
    speak(local);
    return;
  }

  try {
    const reply = await askAI(cmd);
    hideTyping();
    addMsg('jarvis', 'JARVIS', reply);
    speak(reply);
  } catch(e) {
    hideTyping();
    const fallback = "My neural network is offline. Run jarvis.py with ANTHROPIC_API_KEY for full AI capability, Boss.";
    addMsg('jarvis', 'JARVIS', fallback);
  }
}

function quickCmd(cmd) {
  input.value = cmd;
  sendCommand(cmd);
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendCommand(); });

// ── Text-to-Speech ──
function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95; u.pitch = 0.85; u.volume = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Daniel') || v.name.includes('Google UK') || v.name.includes('Male'));
    if (preferred) u.voice = preferred;
    window.speechSynthesis.speak(u);
  }
}

// ── Voice Input ──
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addMsg('system', 'SYS', 'Voice recognition not supported in this browser. Use Chrome.');
    return;
  }

  if (isListening) {
    recognition?.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mode-display').textContent = 'VOICE';
    addMsg('system', 'SYS', 'Voice input active — speak now...');
  };

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    sendCommand(text);
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('mode-display').textContent = 'TEXT';
  };

  recognition.start();
}

// ── Arc Reactor click ──
function activateReactor() {
  const msgs = [
    "Arc reactor output at 3 gigajoules. All systems nominal, Boss.",
    "Power levels optimal. Mark VII standing by.",
    "Repulsor systems charged and ready.",
    "System diagnostics complete. No anomalies detected."
  ];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  addMsg('jarvis', 'JARVIS', msg);
  speak(msg);
}

// Load voices
window.speechSynthesis?.getVoices();
</script>
</body>
</html>
